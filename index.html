<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SiteShow — Descubra sites incríveis</title>
<meta name="description" content="SiteShow é uma plataforma para descobrir sites criados por desenvolvedores.">
<meta name="keywords" content="siteshow, sites, projetos, programador, portfolio">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black: #07070d;
  --dark: #0d0d16;
  --dark2: #12121e;
  --dark3: #1a1a2a;
  --dark4: #22223a;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.11);
  --white: #f0eeff;
  --white2: rgba(240,238,255,0.6);
  --white3: rgba(240,238,255,0.3);
  --accent: #c084fc;
  --accent2: #a855f7;
  --neon-purple: #c084fc;
  --neon-pink: #f472b6;
  --neon-cyan: #22d3ee;
  --neon-green: #4ade80;
  --neon-yellow: #facc15;
  --radius: 14px;
  --radius-sm: 8px;
  --glow-purple: 0 0 20px rgba(192,132,252,0.35), 0 0 40px rgba(192,132,252,0.15);
  --glow-pink: 0 0 20px rgba(244,114,182,0.35), 0 0 40px rgba(244,114,182,0.15);
  --glow-cyan: 0 0 20px rgba(34,211,238,0.35), 0 0 40px rgba(34,211,238,0.15);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--black);
  color: var(--white);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
  overflow-x: hidden;
}

/* BG NOISE */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size: 200px 200px;
  opacity: 0.5;
}

/* GRID LINES */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(192,132,252,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(192,132,252,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--dark); }
::-webkit-scrollbar-thumb { background: var(--accent2); border-radius: 3px; }

/* ===== HEADER ===== */
header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(7,7,13,0.85);
  backdrop-filter: blur(24px);
  border-bottom: 1px solid rgba(192,132,252,0.2);
  box-shadow: 0 1px 0 rgba(192,132,252,0.1), 0 4px 24px rgba(0,0,0,0.4);
  padding: 0 48px;
  display: flex; align-items: center; gap: 0;
  height: 64px;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 22px; font-weight: 900;
  color: var(--white);
  margin-right: 40px; white-space: nowrap;
  cursor: pointer;
  text-shadow: 0 0 30px rgba(192,132,252,0.4);
}
.logo span { color: var(--neon-purple); }

nav { display: flex; gap: 2px; flex: 1; }
.nav-btn {
  padding: 7px 18px; border-radius: 100px;
  font-size: 13.5px; font-weight: 500; cursor: pointer;
  border: none; background: transparent;
  color: var(--white3); font-family: 'Outfit', sans-serif;
  transition: all .2s; letter-spacing: 0.01em;
}
.nav-btn:hover { color: var(--white); background: var(--dark3); }
.nav-btn.active {
  color: var(--black); background: var(--accent);
  font-weight: 600;
  box-shadow: var(--glow-purple);
}

.header-right { display: flex; align-items: center; gap: 12px; }

.btn-neon {
  padding: 8px 20px;
  background: transparent;
  color: var(--neon-purple);
  border: 1px solid var(--neon-purple);
  border-radius: 100px; font-size: 13.5px; font-weight: 600;
  cursor: pointer; font-family: 'Outfit', sans-serif;
  transition: all .2s; white-space: nowrap;
  box-shadow: inset 0 0 12px rgba(192,132,252,0.1), 0 0 12px rgba(192,132,252,0.15);
}
.btn-neon:hover {
  background: var(--neon-purple); color: var(--black);
  box-shadow: var(--glow-purple);
}
.btn-neon.solid {
  background: var(--accent); color: var(--black);
  box-shadow: var(--glow-purple);
}
.btn-neon.solid:hover { background: var(--accent2); }

/* USER AVATAR btn */
.header-user {
  display: flex; align-items: center; gap: 10px;
  cursor: pointer; padding: 4px 14px 4px 4px;
  border: 1px solid rgba(192,132,252,0.3); border-radius: 100px;
  transition: all .2s; background: var(--dark2);
}
.header-user:hover { border-color: var(--neon-purple); box-shadow: var(--glow-purple); }
.header-avatar-img {
  width: 36px; height: 36px; border-radius: 50%; object-fit: cover;
  border: 2px solid var(--neon-purple);
  box-shadow: 0 0 10px rgba(192,132,252,0.4);
}
.header-avatar-txt {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: var(--black);
  box-shadow: 0 0 10px rgba(192,132,252,0.4);
}
.header-username { font-size: 13.5px; font-weight: 600; color: var(--white); }

/* ===== MAIN ===== */
main { max-width: 1200px; margin: 0 auto; padding: 0 48px 80px; position: relative; z-index: 1; }

/* ===== MODAL AUTH ===== */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(7,7,13,0.85);
  backdrop-filter: blur(16px);
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn .2s;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal {
  background: var(--dark2);
  border: 1px solid rgba(192,132,252,0.3);
  border-radius: 20px; padding: 40px;
  width: 100%; max-width: 420px;
  box-shadow: var(--glow-purple), 0 24px 64px rgba(0,0,0,0.6);
  animation: slideUp .3s cubic-bezier(.34,1.56,.64,1);
  position: relative;
}
@keyframes slideUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
.modal-close {
  position: absolute; top: 16px; right: 16px;
  background: var(--dark3); border: none; color: var(--white3);
  width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
  font-size: 16px; display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.modal-close:hover { color: var(--white); background: var(--dark4); }
.modal h2 {
  font-family: 'Playfair Display', serif;
  font-size: 28px; font-weight: 900; margin-bottom: 6px;
}
.modal h2 span { color: var(--neon-purple); }
.modal-sub { font-size: 14px; color: var(--white3); margin-bottom: 28px; }
.modal-tabs { display: flex; gap: 0; margin-bottom: 28px; border-bottom: 1px solid var(--border2); }
.modal-tab {
  flex: 1; padding: 10px; text-align: center;
  font-size: 14px; font-weight: 600; cursor: pointer;
  color: var(--white3); border-bottom: 2px solid transparent;
  transition: all .2s;
}
.modal-tab.active { color: var(--neon-purple); border-bottom-color: var(--neon-purple); }
.auth-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.auth-field label { font-size: 12px; font-weight: 600; color: var(--white3); letter-spacing: 0.07em; text-transform: uppercase; }
.auth-input {
  padding: 12px 16px;
  background: var(--dark3); border: 1px solid var(--border2);
  border-radius: var(--radius-sm); color: var(--white);
  font-size: 14.5px; font-family: 'Outfit', sans-serif;
  outline: none; transition: all .2s; width: 100%;
}
.auth-input:focus { border-color: var(--neon-purple); box-shadow: 0 0 0 3px rgba(192,132,252,0.12); }
.auth-input::placeholder { color: var(--white3); }
.btn-auth {
  width: 100%; padding: 13px;
  background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
  color: var(--black); border: none; border-radius: var(--radius-sm);
  font-size: 15px; font-weight: 700; cursor: pointer;
  font-family: 'Outfit', sans-serif; transition: all .2s;
  box-shadow: 0 0 20px rgba(192,132,252,0.3);
  margin-top: 4px;
}
.btn-auth:hover { transform: translateY(-2px); box-shadow: 0 0 32px rgba(192,132,252,0.5); }
.auth-error { font-size: 13px; color: #f87171; background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); border-radius: var(--radius-sm); padding: 10px 14px; margin-top: 12px; display: none; }
.auth-error.show { display: block; }

/* ===== HERO ===== */
.hero {
  padding: 64px 0 48px;
  display: flex; flex-direction: column; gap: 20px;
}
.hero-eyebrow {
  display: flex; align-items: center; gap: 10px;
  font-size: 12px; font-weight: 600; letter-spacing: 0.12em;
  color: var(--neon-cyan); text-transform: uppercase;
}
.hero-eyebrow::before {
  content: ''; display: inline-block;
  width: 28px; height: 1.5px; background: var(--neon-cyan);
  box-shadow: 0 0 8px var(--neon-cyan);
}
.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(38px, 5vw, 58px);
  font-weight: 900; line-height: 1.08; letter-spacing: -1.5px;
  color: var(--white); max-width: 680px;
}
.hero h1 em { font-style: italic; color: var(--neon-purple); text-shadow: 0 0 30px rgba(192,132,252,0.5); }
.hero-sub { font-size: 16px; color: var(--white2); max-width: 520px; font-weight: 300; line-height: 1.65; }

/* ===== CONTROLS ===== */
.controls { display: flex; flex-direction: column; gap: 14px; margin-bottom: 40px; }
.search-wrap { position: relative; max-width: 520px; }
.search-wrap svg { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); opacity: 0.4; pointer-events: none; color: var(--neon-purple); }
.search-input {
  width: 100%; padding: 13px 16px 13px 46px;
  background: var(--dark2); border: 1px solid var(--border2);
  border-radius: 100px; color: var(--white); font-size: 14.5px;
  font-family: 'Outfit', sans-serif; outline: none; transition: all .2s;
}
.search-input::placeholder { color: var(--white3); }
.search-input:focus { border-color: var(--neon-purple); box-shadow: 0 0 0 3px rgba(192,132,252,0.1), var(--glow-purple); }
.filters { display: flex; gap: 8px; flex-wrap: wrap; }
.filter-btn {
  padding: 6px 16px; border-radius: 100px; font-size: 13px; font-weight: 500;
  cursor: pointer; border: 1px solid var(--border2); background: transparent;
  color: var(--white2); font-family: 'Outfit', sans-serif; transition: all .18s;
}
.filter-btn:hover { border-color: var(--neon-purple); color: var(--white); }
.filter-btn.active {
  background: rgba(192,132,252,0.15); color: var(--neon-purple);
  border-color: var(--neon-purple); font-weight: 600;
  box-shadow: 0 0 12px rgba(192,132,252,0.2);
}

/* ===== FEATURED ===== */
.featured-strip {
  display: grid; grid-template-columns: 1fr 380px; gap: 16px; margin-bottom: 40px;
}
.featured-main {
  background: var(--dark2); border: 1px solid rgba(192,132,252,0.2);
  border-radius: var(--radius); padding: 32px 36px;
  position: relative; overflow: hidden; cursor: pointer;
  transition: all .2s; display: flex; flex-direction: column;
  justify-content: flex-end; min-height: 220px;
}
.featured-main::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(192,132,252,0.08) 0%, transparent 60%);
  pointer-events: none;
}
.featured-main:hover {
  border-color: var(--neon-purple);
  box-shadow: var(--glow-purple), inset 0 0 40px rgba(192,132,252,0.05);
  transform: translateY(-2px);
}
.featured-label {
  position: absolute; top: 20px; left: 24px;
  background: var(--neon-purple); color: var(--black);
  font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; padding: 4px 12px; border-radius: 100px;
  box-shadow: 0 0 16px rgba(192,132,252,0.5);
}
.featured-emoji { font-size: 52px; margin-bottom: 16px; display: block; }
.featured-main h2 {
  font-family: 'Playfair Display', serif;
  font-size: 26px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.5px;
}
.featured-meta { font-size: 13.5px; color: var(--white2); display: flex; gap: 16px; align-items: center; }
.like-count { display: flex; align-items: center; gap: 5px; color: var(--neon-pink); }

.side-stats { display: flex; flex-direction: column; gap: 16px; }
.stat-card {
  background: var(--dark2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px 24px;
  display: flex; align-items: center; gap: 16px; flex: 1;
  transition: all .2s;
}
.stat-card:hover { border-color: rgba(192,132,252,0.2); }
.stat-icon {
  width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center; font-size: 20px;
  background: var(--dark3); flex-shrink: 0;
}
.stat-label { font-size: 12px; color: var(--white3); font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 2px; }
.stat-value { font-size: 22px; font-weight: 600; }

/* ===== SECTION HEAD ===== */
.section-head {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;
}
.section-head h3 { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
.section-head span { font-size: 13px; color: var(--white3); }

/* ===== CARDS ===== */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
.card {
  background: var(--dark2); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; cursor: pointer;
  transition: all .25s; display: flex; flex-direction: column;
  animation: fadeUp .4s both;
}
.card:hover {
  border-color: var(--neon-purple);
  box-shadow: var(--glow-purple);
  transform: translateY(-4px);
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.card-thumb {
  height: 130px; position: relative;
  display: flex; align-items: center; justify-content: center; font-size: 44px; overflow: hidden;
}
.card-thumb-bg { position: absolute; inset: 0; opacity: 0.15; }
.card-badges { position: absolute; top: 10px; right: 10px; display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
.badge { font-size: 10px; font-weight: 700; letter-spacing: 0.05em; padding: 3px 9px; border-radius: 100px; white-space: nowrap; }
.badge-destaque { background: rgba(192,132,252,0.15); color: var(--neon-purple); border: 1px solid rgba(192,132,252,0.4); box-shadow: 0 0 8px rgba(192,132,252,0.2); }
.badge-curtido { background: rgba(244,114,182,0.15); color: var(--neon-pink); border: 1px solid rgba(244,114,182,0.4); box-shadow: 0 0 8px rgba(244,114,182,0.2); }
.badge-novo { background: rgba(34,211,238,0.15); color: var(--neon-cyan); border: 1px solid rgba(34,211,238,0.4); box-shadow: 0 0 8px rgba(34,211,238,0.2); }
.badge-premium { background: rgba(250,204,21,0.15); color: var(--neon-yellow); border: 1px solid rgba(250,204,21,0.4); box-shadow: 0 0 8px rgba(250,204,21,0.2); }

.card-body { padding: 16px 18px 18px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
.card-title { font-size: 16px; font-weight: 600; letter-spacing: -0.2px; }
.card-creator { font-size: 12.5px; color: var(--white3); }
.card-desc { font-size: 13px; color: var(--white2); line-height: 1.55; flex: 1; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-cat { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 500; color: var(--white3); background: var(--dark3); padding: 3px 10px; border-radius: 100px; width: fit-content; }
.card-footer { display: flex; gap: 8px; margin-top: 4px; }
.btn-visit {
  flex: 1; padding: 9px 0;
  background: transparent; color: var(--neon-purple);
  border: 1px solid var(--neon-purple);
  border-radius: var(--radius-sm); font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: 'Outfit', sans-serif; transition: all .18s;
}
.btn-visit:hover { background: var(--neon-purple); color: var(--black); box-shadow: var(--glow-purple); }
.btn-like {
  padding: 9px 14px;
  background: var(--dark3); color: var(--white2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: 'Outfit', sans-serif; transition: all .18s;
  display: flex; align-items: center; gap: 5px; white-space: nowrap;
}
.btn-like:hover { border-color: var(--neon-pink); color: var(--neon-pink); box-shadow: 0 0 10px rgba(244,114,182,0.2); }
.btn-like.liked { background: rgba(244,114,182,0.1); color: var(--neon-pink); border-color: rgba(244,114,182,0.4); box-shadow: 0 0 10px rgba(244,114,182,0.2); }

/* ===== RANKING ===== */
.rank-table { display: flex; flex-direction: column; gap: 1px; border: 1px solid rgba(192,132,252,0.15); border-radius: var(--radius); overflow: hidden; box-shadow: var(--glow-purple); }
.rank-row {
  display: flex; align-items: center; gap: 16px;
  padding: 16px 20px; background: var(--dark2);
  border-bottom: 1px solid var(--border); cursor: pointer;
  transition: all .15s;
}
.rank-row:last-child { border-bottom: none; }
.rank-row:hover { background: var(--dark3); border-left: 2px solid var(--neon-purple); padding-left: 18px; }
.rank-pos { font-size: 18px; font-weight: 700; font-family: 'Playfair Display', serif; min-width: 36px; text-align: center; }
.rank-pos.gold { color: var(--neon-yellow); text-shadow: 0 0 12px rgba(250,204,21,0.6); }
.rank-pos.silver { color: #b0b8c1; text-shadow: 0 0 8px rgba(176,184,193,0.4); }
.rank-pos.bronze { color: #cd7f32; text-shadow: 0 0 8px rgba(205,127,50,0.4); }
.rank-thumb { width: 48px; height: 48px; border-radius: 10px; background: var(--dark3); display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; border: 1px solid var(--border2); }
.rank-info { flex: 1; }
.rank-name { font-size: 15px; font-weight: 600; }
.rank-by { font-size: 12.5px; color: var(--white3); margin-top: 2px; }
.rank-likes { font-size: 14px; font-weight: 600; color: var(--neon-pink); display: flex; align-items: center; gap: 5px; text-shadow: 0 0 8px rgba(244,114,182,0.4); }
.rank-badge-wrap { display: flex; gap: 6px; }

/* ===== SUBMIT ===== */
.submit-layout { display: grid; grid-template-columns: 1fr 380px; gap: 40px; padding: 48px 0; }
.submit-heading { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 900; letter-spacing: -1px; margin-bottom: 8px; }
.submit-sub { font-size: 15px; color: var(--white2); margin-bottom: 36px; font-weight: 300; }
.form { display: flex; flex-direction: column; gap: 20px; }
.field { display: flex; flex-direction: column; gap: 7px; }
.field label { font-size: 12.5px; font-weight: 600; color: var(--white3); letter-spacing: 0.07em; text-transform: uppercase; }
.field input, .field textarea, .field select {
  padding: 12px 16px; background: var(--dark2); border: 1px solid var(--border2);
  border-radius: var(--radius-sm); color: var(--white); font-size: 14.5px;
  font-family: 'Outfit', sans-serif; outline: none; transition: all .2s; width: 100%;
}
.field input:focus, .field textarea:focus { border-color: var(--neon-purple); box-shadow: 0 0 0 3px rgba(192,132,252,0.1); }
.field textarea { resize: vertical; min-height: 96px; line-height: 1.6; }
.field input::placeholder, .field textarea::placeholder { color: var(--white3); }
.cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.cat-option {
  padding: 10px 8px; text-align: center;
  border: 1px solid var(--border2); border-radius: var(--radius-sm);
  cursor: pointer; font-size: 13px; font-weight: 500;
  transition: all .18s; background: var(--dark2); color: var(--white2);
  display: flex; flex-direction: column; gap: 4px; align-items: center;
}
.cat-option .cat-icon { font-size: 20px; }
.cat-option:hover { border-color: var(--neon-purple); color: var(--white); }
.cat-option.sel { border-color: var(--neon-purple); background: rgba(192,132,252,0.1); color: var(--neon-purple); box-shadow: 0 0 12px rgba(192,132,252,0.15); }
.btn-submit {
  padding: 14px 32px;
  background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
  color: var(--black); border: none; border-radius: var(--radius-sm);
  font-size: 15px; font-weight: 700; cursor: pointer;
  font-family: 'Outfit', sans-serif; transition: all .2s; margin-top: 4px;
  box-shadow: 0 0 20px rgba(192,132,252,0.3);
}
.btn-submit:hover { transform: translateY(-2px); box-shadow: 0 0 36px rgba(192,132,252,0.5); }
.tips-card { background: var(--dark2); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; }
.tips-title { font-size: 13px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--white3); margin-bottom: 16px; }
.tip { display: flex; gap: 12px; margin-bottom: 14px; }
.tip:last-child { margin-bottom: 0; }
.tip-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.tip-text { font-size: 13.5px; color: var(--white2); line-height: 1.55; }
.tip-text strong { color: var(--white); font-weight: 600; }
.rules-card { background: rgba(192,132,252,0.05); border: 1px solid rgba(192,132,252,0.2); border-radius: var(--radius); padding: 20px 24px; }
.rules-card .tips-title { color: var(--neon-purple); }
.rule { font-size: 13px; color: var(--white2); margin-bottom: 8px; padding-left: 14px; position: relative; }
.rule::before { content: '·'; position: absolute; left: 0; color: var(--neon-purple); font-size: 18px; line-height: 1; }

/* ===== SUCCESS ===== */
.success-screen { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 80px 0; text-align: center; }
.success-screen.show { display: flex; }
.success-icon { font-size: 64px; margin-bottom: 24px; }
.success-title { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 900; margin-bottom: 10px; }
.success-sub { font-size: 16px; color: var(--white2); margin-bottom: 32px; max-width: 400px; }

/* ===== PROFILE ===== */
.profile-hero {
  background: var(--dark2); border: 1px solid rgba(192,132,252,0.2);
  border-radius: var(--radius); padding: 36px 40px;
  display: flex; gap: 28px; align-items: flex-start; margin-bottom: 40px;
  position: relative; overflow: hidden;
  box-shadow: 0 0 40px rgba(192,132,252,0.08);
}
.profile-hero::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(192,132,252,0.06) 0%, transparent 60%);
  pointer-events: none;
}
.avatar-wrap { position: relative; cursor: pointer; flex-shrink: 0; }
.avatar {
  width: 84px; height: 84px; border-radius: 50%;
  background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
  color: var(--black); display: flex; align-items: center; justify-content: center;
  font-size: 30px; font-weight: 700; font-family: 'Playfair Display', serif;
  border: 3px solid var(--neon-purple);
  box-shadow: 0 0 20px rgba(192,132,252,0.5), 0 0 40px rgba(192,132,252,0.2);
  overflow: hidden;
}
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.avatar-edit-overlay {
  position: absolute; inset: 0; border-radius: 50%;
  background: rgba(7,7,13,0.7); display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity .2s; font-size: 20px;
}
.avatar-wrap:hover .avatar-edit-overlay { opacity: 1; }

.profile-info { flex: 1; }
.profile-name-row { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
.profile-name { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; }
.profile-email { font-size: 13.5px; color: var(--white3); margin-bottom: 14px; }
.profile-stats { display: flex; gap: 28px; margin-bottom: 16px; }
.pstat-val { font-size: 20px; font-weight: 600; color: var(--neon-purple); }
.pstat-lbl { font-size: 12px; color: var(--white3); }
.btn-edit-profile {
  padding: 8px 20px; background: transparent;
  color: var(--neon-cyan); border: 1px solid var(--neon-cyan);
  border-radius: var(--radius-sm); font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: 'Outfit', sans-serif; transition: all .2s;
}
.btn-edit-profile:hover { background: var(--neon-cyan); color: var(--black); box-shadow: var(--glow-cyan); }

/* Edit profile modal */
.edit-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.edit-field label { font-size: 12px; font-weight: 600; color: var(--white3); letter-spacing: 0.07em; text-transform: uppercase; }
.edit-input {
  padding: 11px 14px; background: var(--dark3);
  border: 1px solid var(--border2); border-radius: var(--radius-sm);
  color: var(--white); font-size: 14px; font-family: 'Outfit', sans-serif;
  outline: none; transition: all .2s; width: 100%;
}
.edit-input:focus { border-color: var(--neon-cyan); box-shadow: 0 0 0 3px rgba(34,211,238,0.1); }
.photo-upload-area {
  border: 2px dashed rgba(192,132,252,0.3); border-radius: var(--radius);
  padding: 20px; text-align: center; cursor: pointer; transition: all .2s;
  background: rgba(192,132,252,0.03);
}
.photo-upload-area:hover { border-color: var(--neon-purple); background: rgba(192,132,252,0.06); }
.photo-preview { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; margin: 0 auto 10px; display: block; border: 2px solid var(--neon-purple); }
.photo-label { font-size: 13px; color: var(--white3); }
.photo-label strong { color: var(--neon-purple); }

/* ===== COMMENTS ===== */
.comments-section { margin-top: 40px; }
.comments-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; margin-bottom: 20px; }
.comment-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
.comment-item { background: var(--dark2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px 18px; transition: border-color .2s; }
.comment-item:hover { border-color: rgba(192,132,252,0.2); }
.comment-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.comment-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--dark3); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--neon-purple); overflow: hidden; }
.comment-avatar img { width: 100%; height: 100%; object-fit: cover; }
.comment-user { font-size: 13.5px; font-weight: 600; }
.comment-time { font-size: 12px; color: var(--white3); margin-left: auto; }
.comment-text { font-size: 14px; color: var(--white2); line-height: 1.55; }
.comment-form { display: flex; gap: 10px; }
.comment-form input {
  flex: 1; padding: 11px 16px;
  background: var(--dark2); border: 1px solid var(--border2);
  border-radius: var(--radius-sm); color: var(--white);
  font-size: 14px; font-family: 'Outfit', sans-serif; outline: none; transition: all .2s;
}
.comment-form input:focus { border-color: var(--neon-purple); box-shadow: 0 0 0 3px rgba(192,132,252,0.1); }
.comment-form input::placeholder { color: var(--white3); }
.comment-form button {
  padding: 11px 20px; background: transparent;
  color: var(--neon-purple); border: 1px solid var(--neon-purple);
  border-radius: var(--radius-sm); font-size: 13.5px; font-weight: 600;
  cursor: pointer; font-family: 'Outfit', sans-serif; transition: all .18s; white-space: nowrap;
}
.comment-form button:hover { background: var(--neon-purple); color: var(--black); box-shadow: var(--glow-purple); }

/* ===== EMPTY / LOCKED ===== */
.empty { text-align: center; padding: 60px 20px; color: var(--white3); }
.empty-icon { font-size: 42px; margin-bottom: 14px; }
.empty-text { font-size: 15px; margin-bottom: 20px; }
.locked-msg {
  text-align: center; padding: 80px 20px;
  display: flex; flex-direction: column; align-items: center; gap: 16px;
}
.locked-icon { font-size: 52px; }
.locked-title { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; }
.locked-sub { font-size: 15px; color: var(--white2); max-width: 380px; }

/* ===== DIVIDER ===== */
.divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(192,132,252,0.3), transparent); margin: 40px 0; }

/* ===== TOAST ===== */
.toast {
  position: fixed; bottom: 28px; right: 28px;
  background: var(--dark2); border: 1px solid rgba(192,132,252,0.3);
  border-radius: var(--radius-sm); padding: 14px 20px;
  font-size: 14px; font-weight: 500;
  box-shadow: var(--glow-purple), 0 8px 32px rgba(0,0,0,0.4);
  transform: translateY(80px); opacity: 0;
  transition: all .3s cubic-bezier(.34,1.56,.64,1);
  z-index: 999; display: flex; align-items: center; gap: 10px;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast-icon { font-size: 18px; }

/* ===== FOOTER ===== */
footer {
  border-top: 1px solid rgba(192,132,252,0.1);
  padding: 28px 48px; display: flex; align-items: center; justify-content: space-between;
  position: relative; z-index: 1;
}
.footer-logo { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700; text-shadow: 0 0 20px rgba(192,132,252,0.3); }
.footer-logo span { color: var(--neon-purple); }
.footer-text { font-size: 12.5px; color: var(--white3); }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  header { padding: 0 20px; }
  main { padding: 0 20px 60px; }
  .featured-strip { grid-template-columns: 1fr; }
  .submit-layout { grid-template-columns: 1fr; }
  .side-stats { flex-direction: row; }
}

/* ===== LIGHT MODE ===== */
body.light {
  --black: #f5f4ff;
  --dark: #eceaff;
  --dark2: #ffffff;
  --dark3: #f0eeff;
  --dark4: #e4e0ff;
  --border: rgba(100,80,200,0.12);
  --border2: rgba(100,80,200,0.2);
  --white: #1a1040;
  --white2: rgba(30,15,80,0.7);
  --white3: rgba(30,15,80,0.45);
  --accent: #7c3aed;
  --accent2: #6d28d9;
  --neon-purple: #7c3aed;
  --neon-pink: #db2777;
  --neon-cyan: #0891b2;
  --neon-green: #16a34a;
  --neon-yellow: #ca8a04;
  --glow-purple: 0 0 14px rgba(124,58,237,0.18), 0 0 28px rgba(124,58,237,0.08);
  --glow-pink: 0 0 14px rgba(219,39,119,0.18);
  --glow-cyan: 0 0 14px rgba(8,145,178,0.18);
}
body.light::before { opacity: 0.12; }
body.light::after { background-image: linear-gradient(rgba(124,58,237,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(124,58,237,0.05) 1px, transparent 1px); }
body.light header { background: rgba(245,244,255,0.9); border-bottom-color: rgba(124,58,237,0.15); }
body.light ::-webkit-scrollbar-track { background: #eceaff; }
body.light .rank-row:hover { background: #f0eeff; }
body.light .modal { box-shadow: 0 4px 40px rgba(124,58,237,0.12), 0 16px 48px rgba(0,0,0,0.08); }
body.light footer { border-top-color: rgba(124,58,237,0.15); }

/* theme toggle btn */
.btn-theme {
  width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border2);
  background: var(--dark3); cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; flex-shrink: 0;
}
.btn-theme:hover { border-color: var(--neon-purple); box-shadow: var(--glow-purple); }

/* notif bell */
.btn-notif {
  position: relative; width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border2);
  background: var(--dark3); cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; flex-shrink: 0;
}
.btn-notif:hover { border-color: var(--neon-purple); box-shadow: var(--glow-purple); }
.notif-dot {
  position: absolute; top: 4px; right: 4px;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--neon-pink); border: 2px solid var(--black);
}

/* notif dropdown */
.notif-dropdown {
  position: absolute; top: calc(100% + 8px); right: 0;
  width: 320px; background: var(--dark2);
  border: 1px solid rgba(192,132,252,0.25); border-radius: var(--radius);
  box-shadow: var(--glow-purple), 0 16px 48px rgba(0,0,0,0.4);
  z-index: 300; animation: slideUp .2s;
  max-height: 400px; overflow-y: auto;
}
.notif-header { padding: 14px 16px 10px; font-size: 13px; font-weight: 700; color: var(--white3); letter-spacing: 0.06em; text-transform: uppercase; border-bottom: 1px solid var(--border); }
.notif-item { padding: 12px 16px; display: flex; gap: 10px; align-items: flex-start; border-bottom: 1px solid var(--border); transition: background .15s; cursor: default; }
.notif-item:last-child { border-bottom: none; }
.notif-item:hover { background: var(--dark3); }
.notif-item.unread { background: rgba(192,132,252,0.04); }
.notif-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.notif-body { flex: 1; }
.notif-text { font-size: 13.5px; color: var(--white2); line-height: 1.45; }
.notif-text strong { color: var(--white); }
.notif-time { font-size: 11.5px; color: var(--white3); margin-top: 2px; }
.notif-empty { padding: 28px 16px; text-align: center; font-size: 13.5px; color: var(--white3); }

/* card iframe preview */
.card { position: relative; }
.card-preview-wrap {
  position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
  width: 280px; z-index: 50; pointer-events: none;
  opacity: 0; transition: opacity .2s;
  border-radius: var(--radius-sm); overflow: hidden;
  box-shadow: var(--glow-purple), 0 12px 40px rgba(0,0,0,0.6);
  border: 1px solid rgba(192,132,252,0.3);
  background: var(--dark2);
}
.card:hover .card-preview-wrap { opacity: 1; }
.card-preview-wrap iframe {
  width: 280px; height: 158px; border: none; display: block;
  pointer-events: none;
  transform-origin: top left;
}
.card-preview-label {
  padding: 6px 10px; font-size: 11.5px; color: var(--white3);
  background: var(--dark3); border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 5px;
}

/* card owner actions */
.card-owner-actions {
  display: flex; gap: 6px; margin-top: 4px;
}
.btn-edit-card, .btn-delete-card {
  flex: 1; padding: 7px 0; border-radius: var(--radius-sm);
  font-size: 12px; font-weight: 600; cursor: pointer;
  font-family: 'Outfit', sans-serif; transition: all .18s; border: 1px solid var(--border);
  background: transparent;
}
.btn-edit-card { color: var(--neon-cyan); border-color: rgba(34,211,238,0.3); }
.btn-edit-card:hover { background: rgba(34,211,238,0.1); border-color: var(--neon-cyan); }
.btn-delete-card { color: #f87171; border-color: rgba(248,113,113,0.3); }
.btn-delete-card:hover { background: rgba(248,113,113,0.1); border-color: #f87171; }

/* visit counter badge */
.visit-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; color: var(--neon-green); font-weight: 600;
  background: rgba(74,222,128,0.08); padding: 2px 8px; border-radius: 100px;
  border: 1px solid rgba(74,222,128,0.2);
}

/* FOLLOW btn */
.btn-follow {
  padding: 7px 18px; border-radius: 100px;
  font-size: 12.5px; font-weight: 600; cursor: pointer;

  border: 1px solid var(--neon-cyan); color: var(--neon-cyan); background: transparent;
}
.btn-follow:hover { background: rgba(34,211,238,0.1); box-shadow: var(--glow-cyan); }
.btn-follow.following {
  background: rgba(34,211,238,0.12); color: var(--neon-cyan);
  border-color: var(--neon-cyan);
}

/* public profile card */
.creator-card {
  background: var(--dark2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
  display: flex; align-items: center; gap: 14px;
  cursor: pointer; transition: all .2s;
}
.creator-card:hover { border-color: rgba(192,132,252,0.3); transform: translateY(-2px); box-shadow: var(--glow-purple); }
.creator-mini-avatar {
  width: 46px; height: 46px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));

.creator-mini-avatar img { width: 100%; height: 100%; object-fit: cover; }
.creator-mini-name { font-size: 14.5px; font-weight: 600; }
.creator-mini-stats { font-size: 12px; color: var(--white3); margin-top: 2px; }

/* feed section */
.feed-tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 1px solid var(--border2); }
.feed-tab {
  padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer;
  color: var(--white3); border-bottom: 2px solid transparent; transition: all .2s;
}
.feed-tab.active { color: var(--neon-purple); border-bottom-color: var(--neon-purple); }

/* confetti */
.confetti-piece {
  position: fixed; width: 10px; height: 10px; z-index: 9999;
  pointer-events: none; border-radius: 2px;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0% { opacity: 1; transform: translateY(-20px) rotate(0deg); }
  100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
}

/* thumbnail upload in submit form */
.thumb-upload-area {
  border: 2px dashed rgba(192,132,252,0.3); border-radius: var(--radius-sm);
  padding: 16px; text-align: center; cursor: pointer; transition: all .2s;
  background: rgba(192,132,252,0.03); font-size: 13px; color: var(--white3);
}
.thumb-upload-area:hover { border-color: var(--neon-purple); background: rgba(192,132,252,0.06); }
.thumb-preview { width: 100%; max-height: 120px; object-fit: cover; border-radius: var(--radius-sm); margin-bottom: 8px; display: none; }

/* edit site modal */
.edit-site-modal .field { margin-bottom: 14px; }

/* stat-visits */
.pstat-visits { color: var(--neon-green); }

/* public profile page */
.pub-profile-header {
  background: var(--dark2); border: 1px solid rgba(192,132,252,0.2);
  border-radius: var(--radius); padding: 32px 36px;
  display: flex; gap: 24px; align-items: flex-start; margin-bottom: 32px;
  position: relative; overflow: hidden;
}
.pub-profile-header::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(192,132,252,0.06) 0%, transparent 60%);
  pointer-events: none;
}
.pub-avatar-lg {
  width: 72px; height: 72px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; font-weight: 700; color: var(--black);
  border: 3px solid var(--neon-purple); box-shadow: 0 0 16px rgba(192,132,252,0.4);
  overflow: hidden;
}
.pub-avatar-lg img { width: 100%; height: 100%; object-fit: cover; }

/* notif wrapper positioning */
.notif-wrapper { position: relative; }
</style>
