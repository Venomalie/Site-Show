      <div class="photo-upload-area" onclick="document.getElementById('photo-input').click()">
        <img id="photo-preview-img" class="photo-preview" src="" style="display:none" />
        <div id="photo-placeholder" style="font-size:36px;margin-bottom:8px">📷</div>
        <div class="photo-label">Clique para <strong>escolher uma foto</strong></div>
        <input type="file" id="photo-input" accept="image/*" style="display:none" onchange="handlePhotoUpload(this)" />
      </div>
    </div>
    <div class="edit-field">
      <label>Nome de exibição</label>
      <input class="edit-input" id="edit-name-input" type="text" placeholder="Seu nome" />
    </div>
    <button class="btn-auth" style="background:linear-gradient(135deg,#22d3ee,#4ade80)" onclick="saveProfile()">Salvar alterações ✓</button>
  </div>
</div>

<!-- EDIT SITE MODAL -->
<div class="modal-overlay" id="edit-site-modal" style="display:none" onclick="if(event.target===this)closeEditSiteModal()">
  <div class="modal edit-site-modal" style="max-width:480px">
    <button class="modal-close" onclick="closeEditSiteModal()">✕</button>
    <h2 style="margin-bottom:24px">Editar <span>site</span></h2>
    <div class="edit-field">
      <label>Nome do projeto *</label>
      <input class="edit-input" id="es-name" type="text" placeholder="Nome do projeto" />
    </div>
    <div class="edit-field">
      <label>Link do site *</label>
      <input class="edit-input" id="es-link" type="text" placeholder="https://..." />
    </div>
    <div class="edit-field">
      <label>Descrição</label>
      <textarea class="edit-input" id="es-desc" style="min-height:80px;resize:vertical" placeholder="Descrição do site"></textarea>
    </div>
    <div class="edit-field">
      <label>Thumbnail</label>
      <div class="thumb-upload-area" onclick="document.getElementById('es-thumb-input').click()">
        <img id="es-thumb-preview" class="thumb-preview" src="" style="display:none" />
        <div id="es-thumb-ph">📸 Enviar screenshot do site</div>
        <input type="file" id="es-thumb-input" accept="image/*" style="display:none" onchange="handleThumbUpload(this,'es-thumb-preview')" />
      </div>
    </div>
    <button class="btn-auth" onclick="saveEditSite()">Salvar alterações ✓</button>
  </div>
</div>

<script>
// ===== STATE =====
let currentPage = 'home';
let filterCat = 'todos';
let searchQ = '';
let formData = {name:'',link:'',desc:'',cat:'',creator:'',thumb:''};
let showSuccess = false;
let authTab = 'login';
let pendingPage = null;
let viewingCreator = null; // email of public profile being viewed
let lightMode = false;

// ===== PERSISTENCE =====
function saveState() {
  try {
    localStorage.setItem('ss_users', JSON.stringify(users));
    localStorage.setItem('ss_sites', JSON.stringify(sites));
    localStorage.setItem('ss_likes', JSON.stringify([...likedSet]));
    localStorage.setItem('ss_comments', JSON.stringify(comments));
    localStorage.setItem('ss_follows', JSON.stringify([...followSet]));
    localStorage.setItem('ss_visits', JSON.stringify(visits));
    localStorage.setItem('ss_notifs', JSON.stringify(notifications));
    localStorage.setItem('ss_theme', lightMode ? '1' : '0');
    if (currentUser) localStorage.setItem('ss_current_user', currentUser.email);
  } catch(e) {}
}
function loadState() {
  try {
    const u = localStorage.getItem('ss_users');
    if (u) users = JSON.parse(u);
    const s = localStorage.getItem('ss_sites');
    if (s) sites = JSON.parse(s);
    const l = localStorage.getItem('ss_likes');
    if (l) likedSet = new Set(JSON.parse(l));
    const c = localStorage.getItem('ss_comments');
    if (c) comments = JSON.parse(c);
    const f = localStorage.getItem('ss_follows');
    if (f) followSet = new Set(JSON.parse(f));
    const v = localStorage.getItem('ss_visits');
    if (v) visits = JSON.parse(v);
    const n = localStorage.getItem('ss_notifs');
    if (n) notifications = JSON.parse(n);
    const cu = localStorage.getItem('ss_current_user');
    if (cu && users[cu]) currentUser = users[cu];
    const th = localStorage.getItem('ss_theme');
    if (th === '1') { lightMode = true; document.body.classList.add('light'); }
  } catch(e) {}
}

// ===== USERS & AUTH =====
let users = {};       // { email: {email, name, password, photo, createdAt} }
let currentUser = null;

function openAuthModal(tab) {
  document.getElementById('auth-modal').style.display = 'flex';
  switchTab(tab || 'login');
  document.getElementById('auth-email').value = '';
  document.getElementById('auth-pass').value = '';
  document.getElementById('auth-name').value = '';
  document.getElementById('auth-error').classList.remove('show');
}
function closeAuthModal() {
  document.getElementById('auth-modal').style.display = 'none';
  pendingPage = null;
}
function switchTab(t) {
  authTab = t;
  document.getElementById('tab-login').classList.toggle('active', t==='login');
  document.getElementById('tab-cadastro').classList.toggle('active', t==='cadastro');
  document.getElementById('field-name').style.display = t==='cadastro' ? 'flex' : 'none';
  document.querySelector('#auth-form .btn-auth').textContent = t==='login' ? 'Entrar na conta' : 'Criar conta grátis';
  document.getElementById('auth-error').classList.remove('show');
}
function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg; el.classList.add('show');
}
function handleAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const pass = document.getElementById('auth-pass').value;
  const name = document.getElementById('auth-name').value.trim();
  if (!email || !pass) { showAuthError('Preencha todos os campos.'); return; }
  if (!email.includes('@')) { showAuthError('Email inválido.'); return; }
  if (pass.length < 4) { showAuthError('Senha muito curta (mín. 4 caracteres).'); return; }

  if (authTab === 'cadastro') {
    if (!name) { showAuthError('Digite seu nome.'); return; }
    if (users[email]) { showAuthError('Email já cadastrado. Faça login.'); return; }
    users[email] = { email, name, password: pass, photo: null, createdAt: Date.now() };
    currentUser = users[email];
  } else {
    if (!users[email]) { showAuthError('Email não encontrado. Crie uma conta.'); return; }
    if (users[email].password !== pass) { showAuthError('Senha incorreta.'); return; }
    currentUser = users[email];
  }
  saveState();
  updateHeaderUser();
  closeAuthModal();
  toast('🎉', `Bem-vindo, ${currentUser.name}!`);
  if (pendingPage) { setPage(pendingPage, null); pendingPage = null; }
  else render();
}
function logout() {
  currentUser = null;
  try { localStorage.removeItem('ss_current_user'); } catch(e) {}
  updateHeaderUser();
  setPage('home', document.querySelectorAll('.nav-btn')[0]);
  toast('👋', 'Até logo!');
}
function updateHeaderUser() {
  const hr = document.getElementById('header-right');
  const themeIcon = lightMode ? '☀️' : '🌙';
  if (currentUser) {
    const initials = currentUser.name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
    const photoHTML = currentUser.photo
      ? `<img class="header-avatar-img" src="${currentUser.photo}" />`
      : `<div class="header-avatar-txt">${initials}</div>`;
    const unread = getUnreadNotifs();
    const notifsHTML = notifOpen ? buildNotifDropdown() : '';
    hr.innerHTML = `
      <button class="btn-theme" id="theme-btn" onclick="toggleTheme()" title="Alternar modo">${themeIcon}</button>
      <div class="notif-wrapper">
        <button class="btn-notif" onclick="toggleNotifPanel()" title="Notificações">
          🔔
          ${unread.length > 0 ? '<span class="notif-dot"></span>' : ''}
        </button>
        ${notifsHTML}
      </div>
      <div class="header-user" onclick="requireAuth('profile', document.querySelectorAll('.nav-btn')[4])">
        ${photoHTML}
        <span class="header-username">${currentUser.name.split(' ')[0]}</span>
      </div>
      <button class="btn-neon" onclick="logout()" style="font-size:12.5px;padding:7px 14px">Sair</button>
    `;
  } else {
    hr.innerHTML = `
      <button class="btn-theme" id="theme-btn" onclick="toggleTheme()" title="Alternar modo">${themeIcon}</button>
      <button class="btn-neon" onclick="openAuthModal()">Entrar</button>
      <button class="btn-neon solid" onclick="openAuthModal('cadastro')">Criar conta</button>
    `;
  }
}
function buildNotifDropdown() {
  const notifs = (notifications[currentUser?.email] || []);
  return `<div class="notif-dropdown">
    <div class="notif-header">Notificações</div>
    ${notifs.length === 0
      ? '<div class="notif-empty">Nenhuma notificação ainda 🔕</div>'
      : notifs.map(n=>`
        <div class="notif-item${n.read?'':' unread'}">
          <div class="notif-icon">${n.icon}</div>
          <div class="notif-body">
            <div class="notif-text">${n.text}</div>
            <div class="notif-time">${n.time}</div>
          </div>
        </div>`).join('')}
  </div>`;
}
function requireAuth(page, btn) {
  if (!currentUser) { pendingPage = page; openAuthModal(); return; }
  setPage(page, btn);
}

// ===== SITES DATA =====
let sites = [];   // { id, name, link, desc, cat, emoji, color, creator, creatorEmail, createdAt, badge, thumb }
let likedSet = new Set(); // "siteId_userEmail" or just siteId if not logged in
let comments = {};        // { siteId: [{user, email, photo, text, time, initials}] }
let followSet = new Set(); // "followerEmail_followedEmail"
let visits = {};           // { siteId: count }
let notifications = {};    // { userEmail: [{id, icon, text, time, read}] }

const CAT_EMOJI = {gamer:'🎮', portfólio:'🎨', anime:'⛩️', loja:'🛒', escola:'📚', blog:'✍️', outros:'🌐'};
const CAT_COLORS = {gamer:'#c084fc', portfólio:'#4ade80', anime:'#f472b6', loja:'#facc15', escola:'#22d3ee', blog:'#f97316', outros:'#a3a3a3'};

function getLikeCount(siteId) {
  return sites.find(s=>s.id===siteId)?._likes || 0;
}
function isLiked(siteId) {
  if (!currentUser) return likedSet.has(siteId);
  return likedSet.has(siteId + '_' + currentUser.email);
}
function toggleLike(siteId) {
  const key = currentUser ? siteId + '_' + currentUser.email : siteId;
  const site = sites.find(s=>s.id===siteId);
  if (!site) return;
  if (likedSet.has(key)) {
    likedSet.delete(key);
    site._likes = Math.max(0, (site._likes||0) - 1);
    toast('🤍','Curtida removida');
  } else {
    likedSet.add(key);
    site._likes = (site._likes||0) + 1;
    toast('❤️','Site curtido!');
    // notify site owner
    if (currentUser && site.creatorEmail !== currentUser.email) {
      addNotification(site.creatorEmail, '❤️', `<strong>${currentUser.name}</strong> curtiu seu site <strong>${site.name}</strong>`);
    }
  }
  saveState(); render();
}

// ===== FOLLOWS =====
function isFollowing(targetEmail) {
  if (!currentUser) return false;
  return followSet.has(currentUser.email + '_' + targetEmail);
}
function toggleFollow(targetEmail) {
  if (!currentUser) { openAuthModal(); return; }
  const key = currentUser.email + '_' + targetEmail;
  if (followSet.has(key)) {
    followSet.delete(key);
    toast('👤','Deixou de seguir');
  } else {
    followSet.add(key);
    toast('✅','Seguindo!');
    addNotification(targetEmail, '👥', `<strong>${currentUser.name}</strong> começou a te seguir`);
  }
  saveState(); render();
}
function getFollowers(email) { return [...followSet].filter(k=>k.endsWith('_'+email)).length; }
function getFollowing(email) { return [...followSet].filter(k=>k.startsWith(email+'_')).length; }

// ===== NOTIFICATIONS =====
function addNotification(userEmail, icon, text) {
  if (!notifications[userEmail]) notifications[userEmail] = [];
  notifications[userEmail].unshift({ id: Date.now() + Math.random(), icon, text, time: 'agora', read: false });
  if (notifications[userEmail].length > 30) notifications[userEmail] = notifications[userEmail].slice(0,30);
  saveState();
  if (currentUser && currentUser.email === userEmail) updateHeaderUser();
}
function getUnreadNotifs() {
  if (!currentUser) return [];
  return (notifications[currentUser.email] || []).filter(n=>!n.read);
}
function markNotifsRead() {
  if (!currentUser) return;
  (notifications[currentUser.email] || []).forEach(n=>n.read=true);
  saveState(); updateHeaderUser();
}
let notifOpen = false;
function toggleNotifPanel() {
  notifOpen = !notifOpen;
  if (notifOpen) markNotifsRead();
  updateHeaderUser();
}

// ===== VISITS =====
function recordVisit(siteId) {
  visits[siteId] = (visits[siteId] || 0) + 1;
  saveState();
}

// ===== THEME =====
function toggleTheme() {
  lightMode = !lightMode;
  document.body.classList.toggle('light', lightMode);
  const btn = document.getElementById('theme-btn');
  if (btn) btn.textContent = lightMode ? '☀️' : '🌙';
  saveState();
}

// ===== CONFETTI =====
function launchConfetti() {
  const colors = ['#c084fc','#f472b6','#22d3ee','#4ade80','#facc15','#f97316'];
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left: ${Math.random()*100}vw;
      top: -20px;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      width: ${6+Math.random()*8}px;
      height: ${6+Math.random()*8}px;
      animation-duration: ${1.5+Math.random()*2}s;
      animation-delay: ${Math.random()*0.8}s;
      border-radius: ${Math.random()>0.5?'50%':'2px'};
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

// ===== DELETE / EDIT SITE =====
let editingSiteId = null;
function deleteSite(siteId) {
  if (!currentUser) return;
  if (!confirm('Tem certeza que quer deletar este site?')) return;
  sites = sites.filter(s=>s.id!==siteId);
  delete comments[siteId];
  saveState(); render();
  toast('🗑️','Site deletado.');
}
function openEditSiteModal(siteId) {
  const site = sites.find(s=>s.id===siteId);
  if (!site || site.creatorEmail !== currentUser?.email) return;
  editingSiteId = siteId;
  document.getElementById('es-name').value = site.name;
  document.getElementById('es-link').value = site.link;
  document.getElementById('es-desc').value = site.desc || '';
  const prev = document.getElementById('es-thumb-preview');
  if (site.thumb) { prev.src = site.thumb; prev.style.display = 'block'; }
  else prev.style.display = 'none';
  document.getElementById('edit-site-modal').style.display = 'flex';
}
function closeEditSiteModal() { document.getElementById('edit-site-modal').style.display = 'none'; editingSiteId = null; }
function saveEditSite() {
  if (!editingSiteId) return;
  const site = sites.find(s=>s.id===editingSiteId);
  if (!site) return;
  const name = document.getElementById('es-name').value.trim();
  const link = document.getElementById('es-link').value.trim();
  const desc = document.getElementById('es-desc').value.trim();
  if (!name || !link) { toast('⚠️','Nome e link são obrigatórios.'); return; }
  if (!link.startsWith('http')) { toast('⚠️','Link deve começar com http(s)://'); return; }
  site.name = name; site.link = link; site.desc = desc;
  const prev = document.getElementById('es-thumb-preview');
  if (prev.style.display !== 'none' && prev.src) site.thumb = prev.src;
  saveState(); closeEditSiteModal(); render();
  toast('✅','Site atualizado!');
}
function handleThumbUpload(input, previewId) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const prev = document.getElementById(previewId);
    prev.src = e.target.result; prev.style.display = 'block';
    const ph = document.getElementById(previewId.replace('preview','ph'));
    if (ph) ph.style.display = 'none';
    if (previewId === 'submit-thumb-preview') formData.thumb = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ===== VIEW PUBLIC PROFILE =====
function viewCreator(email) {
  viewingCreator = email;
  setPage('creator', null);
}

// ===== PROFILE EDIT =====
function openEditModal() {
  if (!currentUser) return;
  document.getElementById('edit-modal').style.display = 'flex';
  document.getElementById('edit-name-input').value = currentUser.name;
  const prev = document.getElementById('photo-preview-img');
  const ph = document.getElementById('photo-placeholder');
  if (currentUser.photo) {
    prev.src = currentUser.photo; prev.style.display = 'block'; ph.style.display = 'none';
  } else {
    prev.style.display = 'none'; ph.style.display = 'block';
  }
}
function closeEditModal() { document.getElementById('edit-modal').style.display = 'none'; }
function handlePhotoUpload(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const prev = document.getElementById('photo-preview-img');
    const ph = document.getElementById('photo-placeholder');
    prev.src = e.target.result; prev.style.display = 'block'; ph.style.display = 'none';
  };
  reader.readAsDataURL(file);
}
function saveProfile() {
  const name = document.getElementById('edit-name-input').value.trim();
  if (!name) { toast('⚠️','Digite seu nome.'); return; }
  const photo = document.getElementById('photo-preview-img').style.display !== 'none'
    ? document.getElementById('photo-preview-img').src : null;
  currentUser.name = name;
  currentUser.photo = photo;
  users[currentUser.email] = currentUser;
  // update site creator names
  sites.forEach(s => { if (s.creatorEmail === currentUser.email) { s.creator = name; s.creatorPhoto = photo; } });
  saveState();
  updateHeaderUser();
  closeEditModal();
  toast('✅', 'Perfil atualizado!');
  render();
}

// ===== NAVIGATION =====
function setPage(p, btn) {
  currentPage = p; showSuccess = false; notifOpen = false;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  else {
    const map = {home:0, ranking:1, submit:2, profile:3};
    const idx = map[p]; if (idx !== undefined) document.querySelectorAll('.nav-btn')[idx]?.classList.add('active');
  }
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

// ===== TOAST =====
function toast(icon, text) {
  const t = document.getElementById('toast');
  document.getElementById('toast-icon').textContent = icon;
  document.getElementById('toast-text').textContent = text;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ===== BADGE LOGIC =====
function computeBadge(site) {
  const l = site._likes || 0;
  const age = Date.now() - site.createdAt;
  const oneDay = 86400000;
  if (age < oneDay * 2) return 'novo';
  if (l >= 10) return 'curtido';
  if (l >= 5) return 'destaque';
  return null;
}
function badgeHTML(badge) {
  if (!badge) return '';
  const map = {
    destaque: ['badge-destaque','⭐ Destaque'],
    curtido:  ['badge-curtido','🔥 Mais Curtido'],
    novo:     ['badge-novo','✨ Novo'],
    premium:  ['badge-premium','💎 Premium'],
  };
  const [cls,lbl] = map[badge] || [];
  if (!cls) return '';
  return `<span class="badge ${cls}">${lbl}</span>`;
}

// ===== RENDER CARD =====
function renderCard(s) {
  const liked = isLiked(s.id);
  const badge = computeBadge(s);
  const emoji = s.emoji || CAT_EMOJI[s.cat] || '🌐';
  const color = s.color || CAT_COLORS[s.cat] || '#c084fc';
  const isOwner = currentUser && s.creatorEmail === currentUser.email;
  const visitCount = visits[s.id] || 0;
  const thumbHTML = s.thumb
    ? `<img src="${s.thumb}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:0" />`
    : `<span style="position:relative;z-index:1;font-size:44px">${emoji}</span>`;
  return `
  <div class="card" style="animation-delay:${Math.random()*0.15}s">
    <div class="card-preview-wrap">
      <iframe src="${s.link}" loading="lazy" sandbox="allow-scripts allow-same-origin" scrolling="no"></iframe>
      <div class="card-preview-label">🔍 Preview de ${s.name}</div>
    </div>
    <div class="card-thumb" style="background:${color}18">
      ${thumbHTML}
      <div class="card-thumb-bg" style="background:radial-gradient(circle at 30% 50%, ${color}33, transparent 70%)"></div>
      ${badge ? `<div class="card-badges">${badgeHTML(badge)}</div>` : ''}
    </div>
    <div class="card-body">
      <div>
        <div class="card-title">${s.name}</div>
        <div class="card-creator" style="cursor:pointer;text-decoration:underline;text-underline-offset:2px" onclick="viewCreator('${s.creatorEmail}')">por ${s.creator}</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <div class="card-cat">${CAT_EMOJI[s.cat]||'🌐'} ${s.cat}</div>
        ${visitCount > 0 ? `<span class="visit-badge">👁️ ${visitCount} visita${visitCount!==1?'s':''}</span>` : ''}
      </div>
      <div class="card-desc">${s.desc || 'Sem descrição.'}</div>
      <div class="card-footer">
        <button class="btn-visit" onclick="recordVisit(${s.id});window.open('${s.link}','_blank');render()">Visitar ↗</button>
        <button class="btn-like${liked?' liked':''}" onclick="toggleLike(${s.id})">
          ${liked?'❤️':'🤍'} ${s._likes||0}
        </button>
      </div>
      ${isOwner ? `
      <div class="card-owner-actions">
        <button class="btn-edit-card" onclick="openEditSiteModal(${s.id})">✏️ Editar</button>
        <button class="btn-delete-card" onclick="deleteSite(${s.id})">🗑️ Deletar</button>
      </div>` : ''}
    </div>
  </div>`;
}

// ===== RENDER HOME =====
function renderHome() {
  const cats = ['todos','gamer','portfólio','anime','loja','escola','blog','outros'];
  const catLabel = {todos:'Todos',gamer:'Gamer',portfólio:'Portfólio',anime:'Anime',loja:'Loja',escola:'Escola',blog:'Blog',outros:'Outros'};
  const filtered = sites.filter(s => {
    const mc = filterCat==='todos' || s.cat===filterCat;
    const mq = !searchQ || s.name.toLowerCase().includes(searchQ.toLowerCase()) || s.creator.toLowerCase().includes(searchQ.toLowerCase());
    return mc && mq;
  });
  const sorted = [...filtered].sort((a,b)=>(b._likes||0)-(a._likes||0));
  const total = sites.reduce((a,s)=>a+(s._likes||0),0);
  const topSite = [...sites].sort((a,b)=>(b._likes||0)-(a._likes||0))[0];
  const creators = new Set(sites.map(s=>s.creatorEmail)).size;

  return `
  <div class="hero">
    <div class="hero-eyebrow">Plataforma da comunidade</div>
    <h1>Descubra sites <em>incríveis</em> feitos por pessoas reais</h1>
    <p class="hero-sub">Portfólios, projetos escolares, lojas, blogs e muito mais. Curta, compartilhe e envie o seu.</p>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" placeholder="Buscar sites ou criadores..." value="${searchQ}" oninput="searchQ=this.value;render()" />
    </div>
    <div class="filters">
      ${cats.map(c=>`<button class="filter-btn${filterCat===c?' active':''}" onclick="filterCat='${c}';render()">${CAT_EMOJI[c]||'🌐'} ${catLabel[c]}</button>`).join('')}
    </div>
  </div>

  ${topSite ? `
  <div class="featured-strip">
    <div class="featured-main" onclick="window.open('${topSite.link}','_blank')">
      <div class="featured-label">⭐ Site em Destaque</div>
      <span class="featured-emoji">${topSite.emoji||CAT_EMOJI[topSite.cat]||'🌐'}</span>
      <h2>${topSite.name}</h2>
      <div class="featured-meta">
        <span>por ${topSite.creator}</span>
        <span class="like-count">
          <svg width="14" height="14" fill="#f472b6" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
          ${topSite._likes||0} curtidas
        </span>
      </div>
    </div>
    <div class="side-stats">
      <div class="stat-card"><div class="stat-icon">🌐</div><div><div class="stat-label">Sites publicados</div><div class="stat-value">${sites.length}</div></div></div>
      <div class="stat-card"><div class="stat-icon">❤️</div><div><div class="stat-label">Total de curtidas</div><div class="stat-value">${total.toLocaleString('pt-BR')}</div></div></div>
      <div class="stat-card"><div class="stat-icon">👥</div><div><div class="stat-label">Criadores ativos</div><div class="stat-value">${creators}</div></div></div>
    </div>
  </div>` : ''}

  <div class="section-head">
    <h3>${filtered.length === sites.length ? 'Todos os sites' : `${filtered.length} resultado${filtered.length!==1?'s':''}`}</h3>
    <span>Ordenado por curtidas</span>
  </div>

  ${sorted.length===0 && sites.length===0
    ? `<div class="empty"><div class="empty-icon">🚀</div><div class="empty-text">Nenhum site publicado ainda.</div><div class="empty-text" style="font-size:13px;margin-top:6px">Seja o primeiro a enviar o seu!</div><br><button class="btn-neon" onclick="requireAuth('submit',null)" style="margin:0 auto">+ Enviar meu site</button></div>`
    : sorted.length===0
    ? `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">Nenhum site encontrado.</div></div>`
    : `<div class="grid">${sorted.map(renderCard).join('')}</div>`
  }`;
}

// ===== RENDER RANKING =====
function renderRanking() {
  const sorted = [...sites].sort((a,b)=>(b._likes||0)-(a._likes||0));
  const medals = ['🥇','🥈','🥉'];
  const posClass = ['gold','silver','bronze'];
  return `
  <div class="hero" style="padding-bottom:32px">
    <div class="hero-eyebrow">Placar geral</div>
    <h1>Ranking de <em>curtidas</em></h1>
    <p class="hero-sub">Os sites mais amados pela comunidade — atualizado em tempo real conforme as curtidas chegam.</p>
  </div>
  ${sorted.length===0
    ? `<div class="empty"><div class="empty-icon">🏆</div><div class="empty-text">Nenhum site no ranking ainda.</div><div class="empty-text" style="font-size:13px;margin-top:6px">Publique seu site e comece a receber curtidas!</div></div>`
    : `<div class="rank-table">
    ${sorted.map((s,i)=>`
    <div class="rank-row" onclick="window.open('${s.link}','_blank')">
      <div class="rank-pos ${posClass[i]||''}">${medals[i]||('#'+(i+1))}</div>
      <div class="rank-thumb">${s.emoji||CAT_EMOJI[s.cat]||'🌐'}</div>
      <div class="rank-info">
        <div class="rank-name">${s.name}</div>
        <div class="rank-by">por ${s.creator} · ${s.cat}</div>
      </div>
      <div class="rank-badge-wrap">${badgeHTML(computeBadge(s))}</div>
      <div class="rank-likes">
        <svg width="14" height="14" fill="#f472b6" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        ${s._likes||0}
      </div>
      <button class="btn-like${isLiked(s.id)?' liked':''}" onclick="event.stopPropagation();toggleLike(${s.id})" style="margin-left:8px">
        ${isLiked(s.id)?'❤️':'🤍'} ${isLiked(s.id)?'Curtido':'Curtir'}
      </button>
    </div>`).join('')}
  </div>`}`;
}

// ===== RENDER SUBMIT =====
function renderSubmit() {
  if (!currentUser) return `
  <div class="locked-msg">
    <div class="locked-icon">🔐</div>
    <div class="locked-title">Entre para publicar</div>
    <div class="locked-sub">Você precisa estar logado para enviar seu site.</div>
    <br><button class="btn-neon solid" onclick="openAuthModal()">Entrar ou criar conta</button>
  </div>`;

  if (showSuccess) return `
  <div class="success-screen show">
    <div class="success-icon">🎉</div>
    <h2 class="success-title">Site publicado!</h2>
    <p class="success-sub">Seu projeto já está no SiteShow para todo mundo curtir!</p>
    <button class="btn-submit" onclick="setPage('home',document.querySelectorAll('.nav-btn')[0])">Ver todos os sites →</button>
  </div>`;

  const cats = ['gamer','portfólio','anime','loja','escola','blog','outros'];
  return `
  <div class="submit-layout">
    <div class="submit-left">
      <h2 class="submit-heading">Publique seu <em style="font-style:italic;color:var(--neon-purple)">site</em></h2>
      <p class="submit-sub">Mostre seu projeto para a comunidade.</p>
      <div class="form">
        <div class="field">
          <label>Nome do projeto *</label>
          <input placeholder="ex: Meu Portfólio Criativo" value="${formData.name}" oninput="formData.name=this.value" />
        </div>
        <div class="field">
          <label>Link do site *</label>
          <input placeholder="https://meusite.com.br" value="${formData.link}" oninput="formData.link=this.value" />
        </div>
        <div class="field">
          <label>Descrição</label>
          <textarea placeholder="Fale um pouco sobre o que é seu site..." oninput="formData.desc=this.value">${formData.desc}</textarea>
        </div>
        <div class="field">
          <label>Thumbnail do site (opcional)</label>
          <div class="thumb-upload-area" onclick="document.getElementById('submit-thumb-input').click()">
            <img id="submit-thumb-preview" class="thumb-preview" src="" />
            <div id="submit-thumb-ph">📸 Clique para enviar uma screenshot do seu site</div>
            <input type="file" id="submit-thumb-input" accept="image/*" style="display:none" onchange="handleThumbUpload(this,'submit-thumb-preview');formData.thumb='';" />
          </div>
        </div>
        <div class="field">
          <label>Categoria *</label>
          <div class="cat-grid">
            ${cats.map(c=>`
            <div class="cat-option${formData.cat===c?' sel':''}" onclick="formData.cat='${c}';render()">
              <span class="cat-icon">${CAT_EMOJI[c]||'🌐'}</span>
              <span>${c.charAt(0).toUpperCase()+c.slice(1)}</span>
            </div>`).join('')}
          </div>
        </div>
        <button class="btn-submit" onclick="submitSite()">Publicar meu site ✨</button>
      </div>
    </div>
    <div class="submit-right">
      <div class="tips-card">
        <div class="tips-title">Dicas para se destacar</div>
        <div class="tip"><div class="tip-icon">🎯</div><div class="tip-text"><strong>Nome marcante.</strong> Escolha algo fácil de lembrar e que represente bem o projeto.</div></div>
        <div class="tip"><div class="tip-icon">✍️</div><div class="tip-text"><strong>Boa descrição.</strong> Explique o que faz seu site único em 1-2 frases.</div></div>
        <div class="tip"><div class="tip-icon">📂</div><div class="tip-text"><strong>Categoria certa.</strong> Facilita que as pessoas certas encontrem seu trabalho.</div></div>
        <div class="tip"><div class="tip-icon">🔗</div><div class="tip-text"><strong>Link funcionando.</strong> Verifique se o URL está correto antes de enviar.</div></div>
      </div>
      <div class="rules-card">
        <div class="tips-title">Regras da comunidade</div>
        <div class="rule">Sites devem ser de sua autoria</div>
        <div class="rule">Conteúdo adequado para todas as idades</div>
        <div class="rule">Sem spam ou conteúdo enganoso</div>
        <div class="rule">Links devem estar ativos e funcionais</div>
      </div>
    </div>
  </div>`;
}

function submitSite() {
  if (!formData.name||!formData.link||!formData.cat) {
    toast('⚠️','Preencha os campos obrigatórios!'); return;
  }
  if (!formData.link.startsWith('http')) {
    toast('⚠️','O link deve começar com http:// ou https://'); return;
  }
  const emoji = CAT_EMOJI[formData.cat] || '🌐';
  const color = CAT_COLORS[formData.cat] || '#c084fc';
  const newSite = {
    id: Date.now(),
    name: formData.name,
    link: formData.link,
    desc: formData.desc,
    cat: formData.cat,
    emoji, color,
    thumb: formData.thumb || null,
    creator: currentUser.name,
    creatorEmail: currentUser.email,
    creatorPhoto: currentUser.photo,
    createdAt: Date.now(),
    _likes: 0,
  };
  sites.push(newSite);
  showSuccess = true;
  formData = {name:'',link:'',desc:'',cat:'',creator:'',thumb:''};
  saveState();
  render();
  window.scrollTo({top:0, behavior:'smooth'});
  launchConfetti();
}

// ===== RENDER PROFILE =====
function renderProfile() {
  if (!currentUser) return `
  <div class="locked-msg">
    <div class="locked-icon">👤</div>
    <div class="locked-title">Faça login para ver seu perfil</div>
    <div class="locked-sub">Crie uma conta gratuita e publique seus sites.</div>
    <br><button class="btn-neon solid" onclick="openAuthModal()">Entrar ou criar conta</button>
  </div>`;

  const mySites = sites.filter(s=>s.creatorEmail===currentUser.email);
  const totalLikes = mySites.reduce((a,s)=>a+(s._likes||0),0);
  const myComments = Object.values(comments).flat().filter(c=>c.email===currentUser.email);
  const initials = currentUser.name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();

  const avatarHTML = currentUser.photo
    ? `<img src="${currentUser.photo}" alt="foto" />`
    : initials;

  return `
  <div style="padding-top:48px">
    <div class="profile-hero">
      <div class="avatar-wrap" onclick="openEditModal()">
        <div class="avatar">${avatarHTML}</div>
        <div class="avatar-edit-overlay">✏️</div>
      </div>
      <div class="profile-info">
        <div class="profile-name-row">
          <div class="profile-name">${currentUser.name}</div>
        </div>
        <div class="profile-email">${currentUser.email}</div>
        <div class="profile-stats">
          <div class="pstat"><div class="pstat-val">${mySites.length}</div><div class="pstat-lbl">sites</div></div>
          <div class="pstat"><div class="pstat-val">${totalLikes.toLocaleString('pt-BR')}</div><div class="pstat-lbl">curtidas</div></div>
          <div class="pstat"><div class="pstat-val">${myComments.length}</div><div class="pstat-lbl">comentários</div></div>
          <div class="pstat"><div class="pstat-val pstat-visits">${getFollowers(currentUser.email)}</div><div class="pstat-lbl">seguidores</div></div>
          <div class="pstat"><div class="pstat-val">${getFollowing(currentUser.email)}</div><div class="pstat-lbl">seguindo</div></div>
          <div class="pstat"><div class="pstat-val" style="color:var(--neon-green)">${mySites.reduce((a,s)=>a+(visits[s.id]||0),0)}</div><div class="pstat-lbl">visitas</div></div>
        </div>
        <button class="btn-edit-profile" onclick="openEditModal()">✏️ Editar perfil</button>
      </div>
    </div>

    <div class="section-head">
      <h3>Meus sites publicados</h3>
      <span>${mySites.length} site${mySites.length!==1?'s':''}</span>
    </div>
    ${mySites.length===0
      ? `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">Você ainda não publicou nenhum site.</div><br><button class="btn-neon" onclick="setPage('submit',document.querySelectorAll('.nav-btn')[2])">+ Enviar meu primeiro site</button></div>`
      : `<div class="grid" style="margin-bottom:40px">${mySites.map(renderCard).join('')}</div>`
    }

    <div class="divider"></div>

    <div class="comments-section">
      <div class="comments-title">Comentários recebidos (${Object.entries(comments).filter(([id])=>mySites.find(s=>s.id==id)).flatMap(([,cs])=>cs).length})</div>
      <div class="comment-list">
        ${(() => {
          const allComments = Object.entries(comments)
            .filter(([id]) => mySites.find(s=>s.id==id))
            .flatMap(([id,cs]) => cs.map(c=>({...c, siteName: mySites.find(s=>s.id==id)?.name})));
          if (allComments.length === 0) return `<div style="font-size:14px;color:var(--white3);padding:16px 0">Nenhum comentário ainda.</div>`;
          return allComments.map(c => `
          <div class="comment-item">
            <div class="comment-head">
              <div class="comment-avatar">
                ${c.photo ? `<img src="${c.photo}" />` : (c.initials||'?')}
              </div>
              <div class="comment-user">${c.user}</div>
              <div style="font-size:11.5px;background:var(--dark3);padding:2px 8px;border-radius:100px;color:var(--white3);margin-left:6px">em ${c.siteName}</div>
              <div class="comment-time">${c.time}</div>
            </div>
            <div class="comment-text">${c.text}</div>
          </div>`).join('');
        })()}
      </div>
      <div class="comment-form">
        <input id="cinput" placeholder="Deixe um comentário no seu próprio mural..." />
        <button onclick="addComment()">Enviar</button>
      </div>
    </div>
  </div>`;
}

function addComment(siteId) {
  if (!currentUser) { openAuthModal(); return; }
  const id = siteId || (currentUser ? sites.find(s=>s.creatorEmail===currentUser.email)?.id : null);
  if (!id) return;
  const inp = document.getElementById('cinput');
  if (!inp || !inp.value.trim()) { toast('⚠️','Escreva um comentário!'); return; }
  if (!comments[id]) comments[id] = [];
  const initials = currentUser.name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
  const now = new Date();
  const timeStr = now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  comments[id].unshift({
    user: currentUser.name,
    email: currentUser.email,
    photo: currentUser.photo,
    text: inp.value.trim(),
    time: 'agora ' + timeStr,
    initials
  });
  saveState();
  toast('💬','Comentário adicionado!');
  render();
}

// ===== MAIN RENDER =====
function render() {
  const map = {home:renderHome, ranking:renderRanking, submit:renderSubmit, profile:renderProfile, feed:renderFeed, creator:renderCreatorProfile};
  document.getElementById('main').innerHTML = (map[currentPage]||renderHome)();
}

// ===== RENDER FEED =====
function renderFeed() {
  if (!currentUser) return `<div class="locked-msg"><div class="locked-icon">🔒</div><div class="locked-title">Login necessário</div><div class="locked-sub">Entre para ver seu feed personalizado.</div><br><button class="btn-neon solid" onclick="openAuthModal()">Entrar</button></div>`;

  // sites from followed creators
  const followedEmails = [...followSet].filter(k=>k.startsWith(currentUser.email+'_')).map(k=>k.split('_')[1]);
  const feedSites = sites.filter(s=>followedEmails.includes(s.creatorEmail)).sort((a,b)=>b.createdAt-a.createdAt);

  // suggested creators (not yet followed, have sites)
  const allCreatorEmails = [...new Set(sites.map(s=>s.creatorEmail))].filter(e=>e!==currentUser.email && !followedEmails.includes(e));

  return `
  <div style="padding-top:40px">
    <div class="hero-eyebrow" style="margin-bottom:16px">Feed personalizado</div>
    <h2 style="font-family:'Playfair Display',serif;font-size:32px;font-weight:900;letter-spacing:-0.5px;margin-bottom:32px">
      Sites de quem você <em style="font-style:italic;color:var(--neon-purple)">segue</em>
    </h2>

    ${followedEmails.length === 0 ? `
    <div class="empty" style="margin-bottom:40px">
      <div class="empty-icon">🫂</div>
      <div class="empty-text">Você ainda não segue nenhum criador.</div>
      <div class="empty-text" style="font-size:13px;margin-top:6px">Explore os perfis abaixo e comece a seguir!</div>
    </div>` : feedSites.length === 0 ? `
    <div class="empty" style="margin-bottom:40px">
      <div class="empty-icon">📭</div>
      <div class="empty-text">Os criadores que você segue ainda não publicaram sites.</div>
    </div>` : `
    <div class="grid" style="margin-bottom:40px">${feedSites.map(renderCard).join('')}</div>`}

    ${allCreatorEmails.length > 0 ? `
    <div class="divider"></div>
    <div class="section-head"><h3>Criadores para seguir</h3></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:40px">
      ${allCreatorEmails.slice(0,8).map(email=>{
        const user = users[email];
        if (!user) return '';
        const userSites = sites.filter(s=>s.creatorEmail===email);
        const initials = user.name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
        const photoHTML = user.photo ? `<img src="${user.photo}" />` : initials;
        const followers = getFollowers(email);
        return `
        <div class="creator-card" onclick="viewCreator('${email}')">
          <div class="creator-mini-avatar">${photoHTML}</div>
          <div style="flex:1">
            <div class="creator-mini-name">${user.name}</div>
            <div class="creator-mini-stats">${userSites.length} site${userSites.length!==1?'s':''} · ${followers} seguidor${followers!==1?'es':''}</div>
          </div>
          <button class="btn-follow${isFollowing(email)?' following':''}" onclick="event.stopPropagation();toggleFollow('${email}')">${isFollowing(email)?'✓ Seguindo':'+ Seguir'}</button>
        </div>`;
      }).join('')}
    </div>` : ''}
  </div>`;
}

// ===== RENDER PUBLIC CREATOR PROFILE =====
function renderCreatorProfile() {
  const email = viewingCreator;
  const user = users[email];
  if (!user) return `<div class="locked-msg"><div class="locked-icon">😕</div><div class="locked-title">Criador não encontrado</div><br><button class="btn-neon" onclick="setPage('home',null)">← Voltar</button></div>`;

  const creatorSites = sites.filter(s=>s.creatorEmail===email);
  const totalLikes = creatorSites.reduce((a,s)=>a+(s._likes||0),0);
  const followers = getFollowers(email);
  const initials = user.name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
  const photoHTML = user.photo ? `<img src="${user.photo}" />` : initials;
  const isMe = currentUser && currentUser.email === email;

  return `
  <div style="padding-top:40px">
    <button class="btn-neon" onclick="history.go(-1)||setPage('home',null)" style="margin-bottom:24px;font-size:13px">← Voltar</button>
    <div class="pub-profile-header">
      <div class="pub-avatar-lg">${photoHTML}</div>
      <div style="flex:1">
        <div style="font-family:'Playfair Display',serif;font-size:26px;font-weight:700;margin-bottom:4px">${user.name}</div>
        <div style="font-size:13px;color:var(--white3);margin-bottom:14px">${email}</div>
        <div class="profile-stats">
          <div class="pstat"><div class="pstat-val">${creatorSites.length}</div><div class="pstat-lbl">sites</div></div>
          <div class="pstat"><div class="pstat-val">${totalLikes.toLocaleString('pt-BR')}</div><div class="pstat-lbl">curtidas</div></div>
          <div class="pstat"><div class="pstat-val">${followers}</div><div class="pstat-lbl">seguidores</div></div>
        </div>
        ${!isMe ? `<button class="btn-follow${isFollowing(email)?' following':''}" onclick="toggleFollow('${email}')">${isFollowing(email)?'✓ Seguindo':'+ Seguir'}</button>` : ''}
      </div>
    </div>
    <div class="section-head"><h3>Sites de ${user.name}</h3><span>${creatorSites.length} site${creatorSites.length!==1?'s':''}</span></div>
    ${creatorSites.length === 0
      ? `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">Nenhum site publicado ainda.</div></div>`
      : `<div class="grid">${creatorSites.map(renderCard).join('')}</div>`}
  </div>`;
}

// close notif when clicking outside
document.addEventListener('click', e => {
  if (notifOpen && !e.target.closest('.notif-wrapper')) {
    notifOpen = false;
    updateHeaderUser();
  }
});

// ===== INIT =====
loadState();
updateHeaderUser();
render();
</script>
